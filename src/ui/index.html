<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content check</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 4px;
      }

      /* Spinner animation */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Button reset */
      button {
        font-family: inherit;
      }

      /* Input reset */
      input {
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
